<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Market</title>
    <link rel="stylesheet" href="/index.css">
</head>
<body>
    <!-- Heder -->
    <header class="header">
        <div class="content">
            <div class="header__inner">
                <a href="#" class="logo">
                    <span class="logo__red">Red</span> Market
                </a>
                <nav class="nav">
                    <a href="#" class="nav__link">Xizmatlar</a>
                    <a href="#" class="nav__link">O'quv kursi</a>
                    <a href="#" class="nav__link">Yechimlar</a>
                    <a href="#" class="nav__link">Kontakt</a>                   
                </nav>
                <div class="header__action">
                    <a href="#" class="btn-header">Batafsil malumot</a>
                </div>
            </div>
        </div>
    </header>

    <!-- Main -->
    <main></main>

    <!-- Section -->
    <section></section>
    
    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer__inner">
                <div class="footer__info">
                    <h1 class="footer__title">All Marketing</h1>
                    <p class="footer__text">+998999999999</p>
                    <p class="footer__text">Parmonjonov Baxtiyor</p>
                </div>
                
                <form action="#" method="post" class="footer__form">
                    <h1 class="form__title">O'zingiz haqingizda ma'lumot</h1>
                    <div class="form__group">
                        <input 
                        type="text"
                        placeholder="First name"
                        required
                        class="form__input"
                        />
                        <input 
                        type="text" 
                        placeholder="Last name"
                        required
                        class="form__input"
                        />
                        <button type="submit" class="form__button">
                            Submit
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </footer>

</body>
</html>
