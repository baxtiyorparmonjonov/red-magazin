<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Market</title>
    <style>
        :root{
    --main-red:#ff0000;
    --bg-dark:#1b1b1b;
    --text-white:#ffffff;
    --text-muted:#b3b3b3;
    --font-main:"Sengoe UI", Tahoma, Geneva, Verdana, sans-serif;
}    
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: var(--font-main);
}
.content{
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
}
.header{
    background-color: var(--bg-dark);
    padding: 15px 0;
    position: sticky;
    top: 0;
    z-index: 1000;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
}
.header__inner{
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.logo{
    color: var(--text-white);
    font-size: 22px;
    font-weight: 700;
    text-decoration: none;
    letter-spacing: 0.5px;
}
.logo__red{
    color: var(--main-red);
}
.nav{
    display: flex;
    gap: 30px;
}
.nav__link{
    color: var(--text-muted);
    text-decoration: none;
    font-size: 15px;
    transition: color 0.3s ease;
    font-weight: 500;
}
.nav__link:hover{
    color: var(--text-white);
}
.btn-header{
    display: inline-block;
    background-color: var(--main-red);
    color: var(--text-white);
    text-decoration: none;
    padding: 10px 28px;
    font-size: 14px;
    font-weight: 600;
    border-radius: 20px;
    box-shadow: 0 4px 15px rgba(255, 0, 0, 0.3);
    transition: 
      transform 0.2s ease,       
      background-color 0.3s ease;
}
.btn-header:hover{
    background-color: #cc0000;
    transform: translateY(-2px);
}
.btn-header:active{
    transform: translateY(0);
}
.footer{
    background-color: var(--main-red);
    padding: 20px 0;
    color: var(--text-muted);
}
.footer__inner{
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 30px;
}
.footer__info{
    margin-left: 300px;
    flex: 1;
    min-width: 250px;
}
.footer__title{
    font-size: 24px;
    margin-bottom: 10px;
}
.footer__text{
    font-size: 16px;
    margin-bottom: 5px;
    opacity: 0.9;
}
.footer__form{
    flex: 1;
    min-width: 300px;
    background-color: rgba(255, 255, 255, 0.1);
    padding: 20px;
    border-radius: 8px;
}
.form__title{
    margin-bottom: 15px;
    font-size: 18px;
}
.form__group{
    display: flex;
    flex-direction: column;
    gap: 12px;
}
.form__input{
    width: 500px;
    padding: 12px;
    border: 1px solid rgba(255, 255, 255, 0.3);
    background-color: rgba(255, 255, 255, 0.9);
    border-radius: 4px;
    font-size: 14px;
    color: #333;
    outline: none;
}
.form__input:focus{
    border-color: var(--bg-dark);
}
.form__button{
    background-color: var(--bg-dark);
    color: var(--text-white);
    width: 500px;
    border: none;
    padding: 12px;
    font-size: bold;
    border-radius: 4px;
    cursor: pointer;
    transition: background-color 0.2s ease;
}
.form__button:hover{
    background-color: #333;
}


    </style>
</head>

<body>
    <!-- Heder -->
    <header class="header">
        <div class="content">
            <div class="header__inner">
                <a href="#" class="logo">
                    <span class="logo__red">Red</span> Market
                </a>
                <nav class="nav">
                    <a href="#" class="nav__link">Xizmatlar</a>
                    <a href="#" class="nav__link">O'quv kursi</a>
                    <a href="#" class="nav__link">Yechimlar</a>
                    <a href="#" class="nav__link">Kontakt</a>                   
                </nav>
                <div class="header__action">
                    <a href="#" class="btn-header">Batafsil malumot</a>
                </div>
            </div>
        </div>
    </header>

    <!-- Main -->
    <main></main>

    <!-- Section -->
    <section></section>
    
    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer__inner">
                <div class="footer__info">
                    <h1 class="footer__title">All Marketing</h1>
                    <p class="footer__text">+998999999999</p>
                    <p class="footer__text">Parmonjonov Baxtiyor</p>
                </div>
                
                <form action="#" method="post" class="footer__form">
                    <h1 class="form__title">O'zingiz haqingizda ma'lumot</h1>
                    <div class="form__group">
                        <input 
                        type="text"
                        placeholder="First name"
                        required
                        class="form__input"
                        />
                        <input 
                        type="text" 
                        placeholder="Last name"
                        required
                        class="form__input"
                        />
                        <button type="submit" class="form__button">
                            Submit
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </footer>

</body>
</html>
